<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>
<body>
    <h1>Вход</h1>
    <form action="/autorization" method="post">
        <label for="login">Логин</label>
        <input type="text" name="login" id="login" placeholder="Введите логин" autocomplete="username">
        <label for="password">Пароль</label>
        <input type="password" name="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
        <button type="submit">Войти</button>
    </form>
</body>
</html>
